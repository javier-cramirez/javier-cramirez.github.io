<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  {%- include head.html -%}

  <body>
    <header class="site-header" role="banner">
      <div class="wrapper">
        <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>

        <nav class="site-nav">
          <input type="checkbox" id="nav-trigger" class="nav-trigger" />
          <label for="nav-trigger">
            <span class="menu-icon">
              <svg viewBox="0 0 18 15" width="18px" height="15px" aria-hidden="true">
                <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484C0,0.665,0.665,0,1.484,0h15.032C17.335,0,18,0.665,18,1.484zM18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516zM18,13.516C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516c0-0.82,0.665-1.483,1.484-1.483h15.032C17.335,12.031,18,12.695,18,13.516z"/>
              </svg>
            </span>
          </label>

          <div class="trigger">
            <a class="page-link" href="{{ '/archive.html' | relative_url }}">Blogs</a>
            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">🌙</button>
          </div>
        </nav>
      </div>
    </header>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="wrapper">
        <div class="footer-col-wrapper">
          <div class="footer-col footer-col-1">
            <ul class="contact-list">
              {%- if site.email -%}
                <li><a class="u-email" href="mailto:{{ site.email }}">{{ site.email }}</a></li>
              {%- endif -%}
            </ul>
          </div>

            <div class="footer-col footer-col-2">
            {%- if site.github_username -%}
              <ul class="social-media-list">
                <li>
                  <a href="https://github.com/{{ site.github_username }}">
                      <svg class="svg-icon">
                        <use xlink:href="{{ '/assets/minima-social-icons.svg#github' | relative_url }}"></use>
                      </svg>
                    <span>{{ site.github_username }}</span>
                  </a>
                </li>
              </ul>
            {%- endif -%}
          </div>
        </div>
      </div>
    </footer>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const button = document.getElementById("theme-toggle");
        if (!button) {
          console.log("theme-toggle button not found");
          return;
        }

        const applyTheme = (theme) => {
          if (theme === "dark") {
            document.body.classList.add("dark-mode");
            button.textContent = "☀️";
          } else {
            document.body.classList.remove("dark-mode");
            button.textContent = "🌙";
          }
        };

        const savedTheme = localStorage.getItem("theme") || "dark";
        applyTheme(savedTheme);

        button.addEventListener("click", function () {
          const isDark = document.body.classList.toggle("dark-mode");
          localStorage.setItem("theme", isDark ? "dark" : "light");
          button.textContent = isDark ? "☀️" : "🌙";
          
          if (window.drawWave) {
            window.drawWave();
          }
        });
      });
    </script>
  </body>
</html>
